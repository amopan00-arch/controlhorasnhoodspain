function parsearExcelImport() {
  var fileInput = document.getElementById('importFile');
  var preview = document.getElementById('importPreview');
  if (!fileInput || !fileInput.files || !fileInput.files[0]) {
    preview.innerHTML = '<div class="msgErr">Please select an Excel file first.</div>';
    return;
  }
  var file = fileInput.files[0];
  preview.innerHTML = '<div class="loadingMsg">Loading Excel library…</div>';

  function doParseImport() {
    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var data = new Uint8Array(e.target.result);
        var wb = XLSX.read(data, { type: 'array', cellDates: true });
        var ws = wb.Sheets[wb.SheetNames[0]];
        var rows = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, dateNF: 'YYYY-MM-DD' });
        procesarFilasImport(rows);
      } catch(err) {
        preview.innerHTML = '<div class="msgErr">Error reading file: ' + escapeHtml(err.message) + '</div>';
      }
    };
    reader.readAsArrayBuffer(file);
  }

  if (typeof XLSX === 'undefined') {
    var s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
    s.onload = doParseImport;
    s.onerror = function() {
      preview.innerHTML = '<div class="msgErr">Could not load the Excel library. Check your internet connection.</div>';
    };
    document.head.appendChild(s);
  } else {
    doParseImport();
  }
}

function procesarFilasImport(rows) {
  var preview = document.getElementById('importPreview');

  // Mapeo de nombres de columna (minúsculas) a campos del modelo
  var COL_NAMES = {
    'lunes (fecha)': 'fecha_lunes',
    'fecha lunes': 'fecha_lunes',
    'fecha': 'fecha_lunes',
    'semana': 'fecha_lunes',
    'semana (inicio lunes)': 'fecha_lunes',
    'persona': 'persona',
    'proyecto': 'proyecto',
    'cliente': 'cliente',
    'departamento': 'departamento',
    'total semana': 'horas',
    'horas': 'horas',
    'total horas': 'horas',
    'notas': 'notas',
    'observaciones': 'notas'
  };

  var headerRow = -1;
  var colMap = {};  // { columnIndex: fieldName }

  for (var i = 0; i < Math.min(10, rows.length); i++) {
    var row = rows[i];
    var found = {};
    for (var j = 0; j < row.length; j++) {
      if (!row[j]) continue;
      var key = String(row[j]).trim().toLowerCase();
      if (COL_NAMES[key]) found[j] = COL_NAMES[key];
    }
    // Consideramos válida la fila de cabeceras si tiene al menos "persona" o "fecha_lunes"
    var hasPersona = false, hasFecha = false;
    Object.keys(found).forEach(function(k) {
      if (found[k] === 'persona') hasPersona = true;
      if (found[k] === 'fecha_lunes') hasFecha = true;
    });
    if (hasPersona || hasFecha) {
      headerRow = i;
      colMap = found;
      break;
    }
  }

  if (headerRow === -1) {
    preview.innerHTML = '<div class="msgErr">Header row not found in the first 10 rows. ' +
      'Expected columns: <strong>Lunes (fecha), Persona, Proyecto, Cliente, Departamento, Total semana, Notas</strong>.</div>';
    return;
  }

  var registros = [];
  for (var i = headerRow + 1; i < rows.length; i++) {
    var row = rows[i];
    var rec = {};
    Object.keys(colMap).forEach(function(j) {
      var val = row[parseInt(j, 10)];
      if (val !== undefined && val !== null && String(val).trim() !== '') {
        rec[colMap[j]] = String(val).trim();
      }
    });

    if (!rec.fecha_lunes || !rec.persona || !rec.proyecto || !rec.horas) continue;

    // Normalizar fecha: puede llegar como "DD/MM/YYYY", "MM/DD/YYYY" o "YYYY-MM-DD"
    var f = rec.fecha_lunes;
    if (/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(f)) {
      var parts = f.split('/');
      // Si el primer número es > 12 asumimos DD/MM/YYYY; si no, también (formato español)
      f = parts[2] + '-' + parts[1].padStart(2, '0') + '-' + parts[0].padStart(2, '0');
    } else if (/^\d{4}\/\d{1,2}\/\d{1,2}$/.test(f)) {
      var parts = f.split('/');
      f = parts[0] + '-' + parts[1].padStart(2, '0') + '-' + parts[2].padStart(2, '0');
    }
    rec.fecha_lunes = f;

    // Normalizar horas (puede ser coma decimal)
    rec.horas = parseFloat(String(rec.horas).replace(',', '.'));
    if (isNaN(rec.horas) || rec.horas <= 0) continue;

    registros.push(rec);
  }

  if (registros.length === 0) {
    preview.innerHTML = '<div class="msgErr">No valid records found (date, person, project and hours &gt; 0 are required). ' +
      'Headers detected in row ' + (headerRow + 1) + '.</div>';
    return;
  }

  // Guardar en global para el botón de confirmar
  window._importData = registros;

  var html = '<div class="card">';
  html += '<h3>Preview — ' + registros.length + ' records detected</h3>';
  html += '<p style="font-size:12px;color:#666;margin-bottom:12px">Review the data. Only rows with a valid date, person, project and hours will be imported. A maximum of 20 rows is shown in the preview.</p>';
  html += '<div class="tableWrap" style="max-height:320px"><table class="dataTable"><thead><tr>' +
    '<th>Week Date</th><th>Person</th><th>Project</th><th>Client</th><th>Department</th><th>Hours</th><th>Notes</th>' +
    '</tr></thead><tbody>';
  registros.slice(0, 20).forEach(function(r) {
    html += '<tr>' +
      '<td>' + escapeHtml(r.fecha_lunes) + '</td>' +
      '<td>' + escapeHtml(r.persona || '') + '</td>' +
      '<td>' + escapeHtml(r.proyecto || '') + '</td>' +
      '<td>' + escapeHtml(r.cliente || '') + '</td>' +
      '<td>' + escapeHtml(r.departamento || '') + '</td>' +
      '<td>' + r.horas + '</td>' +
      '<td>' + escapeHtml(r.notas || '') + '</td>' +
      '</tr>';
  });
  if (registros.length > 20) {
    html += '<tr><td colspan="7" style="text-align:center;color:#888;font-style:italic">… and ' + (registros.length - 20) + ' more records</td></tr>';
  }
  html += '</tbody></table></div>';
  html += '<div style="margin-top:14px;display:flex;gap:10px;align-items:center">';
  html += '<button class="btnPrimary" onclick="confirmarImport()">Import ' + registros.length + ' records</button>';
  html += '<button class="btnSecondary" onclick="renderImportar()">Cancel</button>';
  html += '</div>';
  html += '<div id="importResultMsg" style="margin-top:12px"></div>';
  html += '</div>';

  preview.innerHTML = html;
}

function confirmarImport() {
  var registros = window._importData;
  var msgEl = document.getElementById('importResultMsg');
  if (!registros || registros.length === 0) { msgEl.innerHTML = '<div class="msgErr">No data to import.</div>'; return; }
  if (!supabaseClient) { msgEl.innerHTML = '<div class="msgErr">No Supabase connection.</div>'; return; }

  msgEl.innerHTML = '<div class="loadingMsg">Importing ' + registros.length + ' records…</div>';

  var toInsert = registros.map(function(r) {
    return {
      persona: r.persona,
      fecha_lunes: r.fecha_lunes,
      proyecto: r.proyecto,
      cliente: r.cliente || '',
      departamento: r.departamento || DEPARTAMENTOS[0],
      horas: r.horas,
      notas: r.notas || null,
      creado_por: currentUser.usuario
    };
  });

  // Insertar en lotes de 50 para no superar límites de PostgREST
  var batchSize = 50;
  var batches = [];
  for (var i = 0; i < toInsert.length; i += batchSize) {
    batches.push(toInsert.slice(i, i + batchSize));
  }

  var inserted = 0;
  var errores = [];

  function nextBatch(idx) {
    if (idx >= batches.length) {
      loadAllData(function() {
        if (errores.length > 0) {
          msgEl.innerHTML = '<div class="msgErr">Imported ' + inserted + ' records. Errors in ' + errores.length + ' batch(es): ' + errores.slice(0, 3).join('; ') + '</div>';
        } else {
          msgEl.innerHTML = '<div class="msgOk">Successfully imported <strong>' + inserted + ' records</strong>.</div>';
          window._importData = null;
        }
      });
      return;
    }
    supabaseClient.from('registros_horas').insert(batches[idx]).then(function(res) {
      if (res.error) { errores.push('Batch ' + (idx + 1) + ': ' + res.error.message); }
      else { inserted += batches[idx].length; }
      nextBatch(idx + 1);
    }).catch(function(e) {
      errores.push('Batch ' + (idx + 1) + ': ' + e.message);
      nextBatch(idx + 1);
    });
  }

  nextBatch(0);
}

</script>
</body>
</html>
